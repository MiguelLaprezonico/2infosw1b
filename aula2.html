<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 02 Javascript</title>
   


</head>
<body>
    <h1>Display</h1>
    <p id="demo">Vou sumir</p>
    <button onclick="document.getElementById('demo').style.display = 'none'" type="button">Sumir</button>
    <button onclick="document.getElementById('demo').style.display = 'block'" type="button">Aparecer</button>
</body>
 <script>document.getElementById("demo").innerHTML = "My First JavaScript";</script>
</html>
